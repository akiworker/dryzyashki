<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				var key = 'dryzyashki-lang';
				var stored = localStorage.getItem(key);
				if (stored === 'ru' || stored === 'en') {
					document.documentElement.lang = stored;
					return;
				}

				var russianLangs = ['ru', 'uk', 'be', 'kk', 'ky', 'tg', 'uz', 'az', 'hy', 'mn', 'mo'];
				var languages = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en'];

				for (var i = 0; i < languages.length; i++) {
					var code = languages[i].toLowerCase().split('-')[0];
					if (russianLangs.indexOf(code) !== -1) {
						document.documentElement.lang = 'ru';
						return;
					}
				}

				document.documentElement.lang = 'en';
			})();
		</script>
		<link rel="icon" type="image/webp" href="/favicon.webp">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
